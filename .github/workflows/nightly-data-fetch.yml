name: Daily Vega Lab Ops Refresh

on:
  schedule:
    - cron: "0 0 * * *" # Every day at midnight UTC
  workflow_dispatch:

concurrency:
  group: vega-lab-daily-ops-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-vega-lab-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh starred repositories
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: pnpm run build:data

      - name: Sync owned and collaborative repositories
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: pnpm run sync:mine

      - name: Regenerate statistics
        run: pnpm run generate:stats

      - name: Verify generated datasets
        run: pnpm run test:data

      - name: Commit and push generated Vega Lab data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if [[ -n $(git status --porcelain -- data/*.json public/*.json README.md) ]]; then
            git add data/*.json public/*.json README.md
            git commit -m "chore(data): refresh vega lab snapshots [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
            echo "Vega Lab data updated and pushed to main."
          else
            echo "No generated data changes detected."
          fi
